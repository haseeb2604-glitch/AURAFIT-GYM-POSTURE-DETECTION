{% extends 'gym/base.html' %}
{% block title %}Login — AuraFit Pro{% endblock %}
{% block content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center px-3" style="background: radial-gradient(ellipse at top, #0d1f2d 0%, #0a0d14 60%);">
  <div style="width:100%;max-width:440px;">
    <div class="text-center mb-4">
      <div style="font-size:3rem;">⚡</div>
      <h1 style="font-weight:800;font-size:2rem;color:#00ffcc;letter-spacing:2px;">AURAFIT PRO</h1>
      <p style="color:#6b7a99;">Next-Gen AI Gym Coach</p>
    </div>
    <div class="card-dark p-4">
      <h5 class="mb-4" style="color:#94a3b8;">Sign in to your account</h5>
      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label>Username</label>
          <input type="text" name="username" class="form-control" placeholder="Enter username" required>
        </div>
        <div class="mb-3">
          <label>Password</label>
          <input type="password" name="password" class="form-control" placeholder="Enter password" required>
        </div>
        <button type="submit" class="btn btn-accent w-100 py-2 mt-2">
          <i class="bi bi-lightning-fill me-2"></i>Start Training
        </button>
      </form>
      <hr style="border-color:#1e2a3a;margin:20px 0;">
      <p class="text-center mb-0" style="color:#6b7a99;font-size:0.9rem;">
        New here? <a href="{% url 'register' %}" style="color:#00ffcc;text-decoration:none;font-weight:600;">Create Account</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
